services:
  votek:
    build: .
    image: votek
    ports:
      - "8787:8787"
    environment:
      # Leave GEMINI_API_KEY unset for mock mode, or export it in your shell / a .env file
      # next to this compose file and it will be passed through.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-live-001}
      PORT: 8787
    restart: unless-stopped
