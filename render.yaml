# Render Blueprint — deploys VoTek to a real HTTPS URL (unblocks camera + GPS).
#
# Setup (one time, ~5 min):
#   1. Push this repo to GitHub (already done).
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect the repo; Render reads this file and builds the Dockerfile.
#   4. In the service's Environment tab, set GEMINI_API_KEY (leave blank for mock mode).
#   5. Deploy → you get https://votek-XXXX.onrender.com with a valid cert.
#
# Render injects PORT at runtime; the broker already listens on process.env.PORT.
services:
  - type: web
    name: votek
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set in the dashboard; never committed
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-live-001
      # Optional Google Maps basemap. Vite reads these at web build time (Render exposes
      # env vars to Docker builds). Leave unset to use the free key-less MapLibre map.
      - key: VITE_MAP_BACKEND
        sync: false # set to "google" in the dashboard to enable
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false # browser key — restrict to your onrender.com URL; never committed
